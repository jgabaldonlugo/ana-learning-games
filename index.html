<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Ana's Learning Games ⭐</title>
<link rel="manifest" href="manifest.webmanifest" />
<meta name="theme-color" content="#ff5fa2" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-title" content="Ana's Games" />
<link rel="apple-touch-icon" href="apple-touch-icon.png" />
<link rel="icon" type="image/png" href="favicon.png" />
<style>
  *{box-sizing:border-box;}
  html,body{height:100%;margin:0;}
  body{font-family:"Comic Sans MS",system-ui,sans-serif; color:#2b2b54;
    background:linear-gradient(135deg,#ffd6f5,#c9e7ff 50%,#d7ffd9);
    background-size:300% 300%; animation:bg 18s ease infinite;
    display:flex; align-items:center; justify-content:center; min-height:100%; padding:18px;}
  @keyframes bg{0%{background-position:0 50%}50%{background-position:100% 50%}100%{background-position:0 50%}}
  .card{width:100%; max-width:480px; background:rgba(255,255,255,.85); border-radius:32px;
    padding:30px 24px 34px; box-shadow:0 18px 50px rgba(120,80,160,.35); text-align:center;}
  h1{font-size:2.3rem; margin:0 0 4px; color:#ff5fa2; text-shadow:2px 2px 0 #fff;}
  p.sub{color:#9b6dff; font-weight:bold; margin:0 0 26px;}
  a.game{display:flex; align-items:center; justify-content:center; gap:12px; text-decoration:none;
    color:#fff; font-size:1.5rem; font-weight:bold; padding:24px; border-radius:24px; margin-bottom:18px;
    box-shadow:0 8px 0 rgba(0,0,0,.18); transition:transform .08s;}
  a.game:active{transform:translateY(4px); box-shadow:0 4px 0 rgba(0,0,0,.18);}
  .math{background:linear-gradient(120deg,#ff7eb3,#ff5fa2);}
  .reading{background:linear-gradient(120deg,#5ec6ff,#3aa0ff);}
  .foot{font-size:.85rem; color:#7a8; margin-top:8px;}
</style>
</head>
<body>
  <div class="card">
    <h1>Ana's Learning ⭐</h1>
    <p class="sub">Pick a game and have fun!</p>
    <a class="game math" href="math.html">⭐ Math Stars</a>
    <a class="game reading" href="reading.html">🚀 Reading Rockets</a>
    <button id="installBtn" style="display:none; width:100%; border:none; border-radius:20px; padding:16px;
      font-family:inherit; font-size:1.15rem; font-weight:bold; color:#7a5a00; cursor:pointer;
      background:linear-gradient(120deg,#ffe88a,#ffd23f); box-shadow:0 6px 0 rgba(0,0,0,.15); margin-bottom:14px;">
      📲 Install on this tablet
    </button>
    <div class="foot">🎤 Tap "Allow" the first time so Reading Rockets can hear you read!</div>
  </div>
  <script>
    // Register service worker for offline + installability
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => navigator.serviceWorker.register("sw.js").catch(()=>{}));
    }
    // Custom install button (Android/Chrome)
    let deferred=null;
    const btn=document.getElementById("installBtn");
    window.addEventListener("beforeinstallprompt", e => { e.preventDefault(); deferred=e; btn.style.display="block"; });
    btn.addEventListener("click", async () => {
      if(!deferred) return;
      deferred.prompt(); await deferred.userChoice; deferred=null; btn.style.display="none";
    });
    window.addEventListener("appinstalled", () => { btn.style.display="none"; });
  </script>
</body>
</html>
